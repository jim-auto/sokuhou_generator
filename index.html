<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>即報ジェネレータ</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Sokuhou Generator</p>
          <h1>即報ジェネレータ</h1>
        </div>
        <div class="save-state" id="saveStatus" aria-live="polite">自動保存</div>
      </header>

      <main class="workspace">
        <section class="panel input-panel" aria-labelledby="inputTitle">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Input</p>
              <h2 id="inputTitle">入力フォーム</h2>
            </div>
            <div class="action-row">
              <button class="button secondary" type="button" id="sampleButton">サンプル入力</button>
              <button class="button subtle" type="button" id="clearButton">クリア</button>
            </div>
          </div>

          <form id="reportForm" class="report-form">
            <div class="option-grid">
              <fieldset class="option-group">
                <legend>ジャンル</legend>
                <div class="segmented tone-segmented" role="radiogroup" aria-label="ナンパ師ジャンル">
                  <label>
                    <input type="radio" name="tone" value="street" checked>
                    <span>スト師標準</span>
                  </label>
                  <label>
                    <input type="radio" name="tone" value="power">
                    <span>パワギラ即</span>
                  </label>
                  <label>
                    <input type="radio" name="tone" value="beam">
                    <span>目ビーム</span>
                  </label>
                  <label>
                    <input type="radio" name="tone" value="appointment">
                    <span>即確アポ</span>
                  </label>
                  <label>
                    <input type="radio" name="tone" value="reviewer">
                    <span>反省職人</span>
                  </label>
                  <label>
                    <input type="radio" name="tone" value="calm">
                    <span>淡々速報</span>
                  </label>
                </div>
              </fieldset>

              <fieldset class="option-group">
                <legend>長さ</legend>
                <div class="segmented" role="radiogroup" aria-label="出力の長さ">
                  <label>
                    <input type="radio" name="length" value="short" checked>
                    <span>短め</span>
                  </label>
                  <label>
                    <input type="radio" name="length" value="standard">
                    <span>標準</span>
                  </label>
                  <label>
                    <input type="radio" name="length" value="detailed">
                    <span>詳しめ</span>
                  </label>
                </div>
              </fieldset>

              <fieldset class="option-group">
                <legend>入力モード</legend>
                <div class="segmented mode-segmented" role="radiogroup" aria-label="入力モード">
                  <label>
                    <input type="radio" name="inputMode" value="manual" checked>
                    <span>詳細入力</span>
                  </label>
                  <label>
                    <input type="radio" name="inputMode" value="bulk">
                    <span>一括メモ</span>
                  </label>
                </div>
              </fieldset>
            </div>

            <div class="seed-control">
              <label class="field seed-field">
                <span>シード</span>
                <input type="text" data-control="seed" placeholder="例: A7F3K2" autocomplete="off" inputmode="latin">
              </label>
              <button class="button secondary seed-button" type="button" id="randomSeedButton">ランダム</button>
            </div>

            <fieldset class="option-group result-type-options">
              <legend>結果タイプ</legend>
              <div class="segmented result-type-segmented" role="radiogroup" aria-label="結果タイプ">
                <label>
                  <input type="radio" name="resultType" value="auto" checked>
                  <span>自動</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="manseki">
                  <span>満即</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="junseki">
                  <span>準即</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="banget">
                  <span>番ゲ</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="line">
                  <span>LINE交換</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="appointment">
                  <span>即確アポ</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="ask">
                  <span>アポ打診</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="close">
                  <span>解散</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="ng">
                  <span>NG</span>
                </label>
                <label>
                  <input type="radio" name="resultType" value="seed">
                  <span>種まき</span>
                </label>
              </div>
            </fieldset>

            <fieldset class="option-group profile-options">
              <legend>案件プロフィール</legend>
              <label class="toggle-line">
                <input type="checkbox" data-control="includeProfile" checked>
                <span>出力に入れる</span>
              </label>
              <div class="profile-grid">
                <label class="field">
                  <span>年齢</span>
                  <input type="text" data-field="age" placeholder="例: 24" autocomplete="off" inputmode="numeric">
                </label>
                <label class="field">
                  <span>職業</span>
                  <input type="text" data-field="occupation" placeholder="例: OL" autocomplete="off">
                </label>
                <label class="field">
                  <span>スト値</span>
                  <input type="text" data-field="streetValue" placeholder="例: 7" autocomplete="off" inputmode="decimal">
                </label>
                <label class="field">
                  <span>カップ</span>
                  <input type="text" data-field="cup" placeholder="例: D" autocomplete="off">
                </label>
                <label class="field">
                  <span>スペ値</span>
                  <input type="text" data-field="specValue" placeholder="例: 8" autocomplete="off" inputmode="decimal">
                </label>
                <label class="field">
                  <span>JOJO</span>
                  <input type="text" data-field="jojo" placeholder="例: 有" autocomplete="off">
                </label>
              </div>
            </fieldset>

            <div class="bulk-panel" id="bulkPanel" hidden>
              <label class="field full">
                <span>一括メモ</span>
                <textarea data-control="bulkMemo" rows="9" placeholder="例:
エリア: 渋谷
相手: 綺麗めOL
年齢: 24
職業: OL
スト: 7
カップ: D
結果: 連絡先交換。即確アポ見えた
結果タイプ: 即確アポ
良: 目ビーム刺さり
反省: クロージング前に話題が散った"></textarea>
              </label>
            </div>

            <div class="field-grid" id="manualFields">
              <label class="field">
                <span>エリア</span>
                <input type="text" data-field="area" placeholder="例: 渋谷駅周辺" autocomplete="off">
              </label>

              <label class="field">
                <span>日時</span>
                <input type="datetime-local" data-field="datetime">
              </label>

              <label class="field full">
                <span>相手の系統</span>
                <input type="text" data-field="opponent" placeholder="例: 20代後半・落ち着いた雰囲気" autocomplete="off">
              </label>

              <label class="field full">
                <span>オープン</span>
                <textarea data-field="open" rows="3" placeholder="最初の入り方、声かけ、導入など"></textarea>
              </label>

              <label class="field full">
                <span>序盤反応</span>
                <textarea data-field="early" rows="3" placeholder="表情、警戒感、返答の量など"></textarea>
              </label>

              <label class="field full">
                <span>中盤反応</span>
                <textarea data-field="middle" rows="3" placeholder="会話の伸び、温度感、話題の変化など"></textarea>
              </label>

              <label class="field full">
                <span>結果</span>
                <textarea data-field="result" rows="3" placeholder="最終的な結果、所要時間、次につながった点など"></textarea>
              </label>

              <label class="field full">
                <span>良かった点</span>
                <textarea data-field="good" rows="3" placeholder="継続したい動き、反応が良かった要素など"></textarea>
              </label>

              <label class="field full">
                <span>反省点</span>
                <textarea data-field="reflection" rows="3" placeholder="詰まった点、改善余地、判断ミスなど"></textarea>
              </label>

              <label class="field full">
                <span>次回改善</span>
                <textarea data-field="next" rows="3" placeholder="次に試すこと、意識することなど"></textarea>
              </label>

              <label class="field full">
                <span>自由メモ</span>
                <textarea data-field="memo" rows="4" placeholder="補足、状況、細かい気づきなど"></textarea>
              </label>
            </div>
          </form>
        </section>

        <section class="panel output-panel" aria-labelledby="outputTitle">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Preview</p>
              <h2 id="outputTitle">生成候補</h2>
            </div>
          </div>
          <div class="candidate-list" id="candidateList" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
